<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>設定画面デモ</title>
    <style>
      :root {
        --bg: #eef0f6;
        --card: #f8f9fd;
        --line: #cdd5ea;
        --ink: #1d3158;
        --muted: #5c6f94;
        --mint: #d8eee8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .container {
        max-width: 940px;
        margin: 28px auto;
        padding: 0 16px 40px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 4px 12px rgba(29, 49, 88, 0.06);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 30px;
      }

      .section {
        border: 1px solid #bfcae6;
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 16px;
      }

      .section-title {
        margin: 0;
        background: #d9deef;
        border-bottom: 1px solid #c1cbe8;
        padding: 12px 14px;
        font-size: 20px;
      }

      .section-body {
        background: #f2f4fb;
        padding: 14px;
      }

      .table {
        display: grid;
        grid-template-columns: minmax(200px, 1fr) minmax(260px, 1.2fr);
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .table .cell {
        padding: 9px 10px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        min-height: 46px;
        display: flex;
        align-items: center;
      }

      .table .cell:nth-child(2n) { border-right: none; }
      .table .cell:last-child,
      .table .cell:nth-last-child(2) { border-bottom: none; }

      .label { font-weight: 700; }

      .setting-input,
      .setting-select {
        width: 100%;
        min-height: 34px;
        border: 1px solid #b9c7e8;
        border-radius: 8px;
        padding: 6px 10px;
        background: #fff;
        color: var(--ink);
        font-size: 14px;
      }

      .readonly-value {
        width: 100%;
        min-height: 34px;
        border: 1px solid #d2d9ed;
        border-radius: 8px;
        padding: 6px 10px;
        background: #edf1fb;
        color: #31486f;
        display: flex;
        align-items: center;
      }

      .input-with-unit {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
      }

      .unit {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .choice-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
      }

      .choice-row label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
      }

      .subgrid {
        margin-top: 14px;
        border: 1px solid #b6d5cb;
        border-radius: 12px;
        background: var(--mint);
        padding: 14px;
      }

      .subgrid-title {
        margin: 0 0 10px;
        color: #2f4f45;
        font-weight: 700;
        font-size: 16px;
      }

      .radio-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .radio-row label {
        background: #edf4f1;
        border: 1px solid #9ec3b6;
        padding: 6px 10px;
        border-radius: 999px;
        display: inline-flex;
        gap: 6px;
      }

      .abc {
        display: grid;
        grid-template-columns: 1.5fr 1fr 0.7fr;
        border: 1px solid #a8cfc1;
        border-radius: 10px;
        overflow: hidden;
      }

      .abc div {
        padding: 8px 10px;
        border-bottom: 1px solid #a8cfc1;
        border-right: 1px solid #a8cfc1;
        background: #eff7f4;
        display: flex;
        align-items: center;
      }

      .abc div:nth-child(3n) { border-right: none; }
      .abc div:nth-last-child(-n + 3) { border-bottom: none; }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 18px;
      }

      .btn {
        border-radius: 10px;
        min-height: 40px;
        padding: 0 18px;
        border: 1px solid #99aad8;
        background: #f3f6ff;
        color: #27427f;
        font-weight: 700;
        cursor: pointer;
      }

      .btn.primary {
        border-color: #4b68c9;
        background: #4b68c9;
        color: #fff;
      }

      @media (max-width: 900px) {
        .table,
        .abc { grid-template-columns: 1fr; }
        .table .cell,
        .abc div { border-right: none !important; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="panel">
        <h1>設定画面</h1>

        <article class="section">
          <h2 class="section-title">基本設定</h2>
          <div class="section-body">
            <div class="table">
              <div class="cell label">氏名</div><div class="cell"><div class="readonly-value">メサイア太郎</div></div>
              <div class="cell label">ショップ名</div><div class="cell"><div class="readonly-value">mesaia japan</div></div>
              <div class="cell label">セラーID</div><div class="cell"><div class="readonly-value">AS～～</div></div>
              <div class="cell label">SLC会員番号</div><div class="cell"><div class="readonly-value">AZ001</div></div>
              <div class="cell label">粗利益率</div><div class="cell"><div class="input-with-unit"><input class="setting-input" type="number" value="5" min="0" /><span class="unit">%</span></div></div>
              <div class="cell label">予測30日販売数</div><div class="cell"><input class="setting-input" type="number" value="1" min="0" /></div>
              <div class="cell label">関税割合</div><div class="cell"><div class="input-with-unit"><input class="setting-input" type="number" value="17.80" step="0.01" min="0" /><span class="unit">%</span></div></div>
              <div class="cell label">送料係数</div><div class="cell"><input class="setting-input" type="number" value="1.2" step="0.1" min="0" /></div>
              <div class="cell label">Amazonポイントを加味する</div><div class="cell"><label class="toggle"><input type="checkbox" checked />有効</label></div>
              <div class="cell label">Amazonクーポンを加味する</div><div class="cell"><label class="toggle"><input type="checkbox" checked />有効</label></div>
              <div class="cell label">リサーチ時にセラーIDを収集する</div><div class="cell"><label class="toggle"><input type="checkbox" checked />有効</label></div>
              <div class="cell label">知財</div><div class="cell"><label class="toggle"><input type="checkbox" checked />有効</label></div>
              <div class="cell label">大型</div><div class="cell"><label class="toggle"><input type="checkbox" checked />有効</label></div>
              <div class="cell label">T売上目標</div><div class="cell"><div class="input-with-unit"><input class="setting-input" type="number" value="100000" min="0" /><span class="unit">円</span></div></div>
              <div class="cell label">T利益目標</div><div class="cell"><div class="input-with-unit"><input class="setting-input" type="number" value="100000" min="0" /><span class="unit">円</span></div></div>
              <div class="cell label">対象ショップ</div>
              <div class="cell">
                <div class="choice-row">
                  <label><input type="radio" name="shop" checked />Amazon</label>
                  <label><input type="radio" name="shop" />Yahoo!</label>
                  <label><input type="radio" name="shop" />楽天</label>
                  <label><input type="radio" name="shop" />ヨドバシ</label>
                </div>
              </div>
              <div class="cell label">SLC利用</div><div class="cell"><select class="setting-select"><option selected>利用中</option><option>未利用</option></select></div>
            </div>
          </div>
        </article>

        <article class="section">
          <h2 class="section-title">ASINスコア算出設定</h2>
          <div class="section-body">
            <div class="subgrid">
              <p class="subgrid-title">算出期間</p>
              <div class="radio-row" id="termRadios">
                <label><input type="radio" name="term" value="short" /> 短期（速度重視）</label>
                <label><input type="radio" name="term" value="standard" checked /> 標準</label>
                <label><input type="radio" name="term" value="long" /> 長期（安定重視）</label>
                <label><input type="radio" name="term" value="custom" /> カスタマイズ</label>
              </div>
              <div class="abc">
                <div class="label">A.データ範囲</div><div><input id="rangeA" class="setting-input" type="number" value="90" min="1" /></div><div>日</div>
                <div class="label">B.時間重み</div><div><input id="weightB" class="setting-input" type="number" value="60" min="1" /></div><div>日</div>
                <div class="label">C.周期判定</div><div><input id="periodC" class="setting-input" type="number" value="60" min="1" /></div><div>日</div>
              </div>
            </div>

            <div class="subgrid">
              <p class="subgrid-title">その他算出設定</p>
              <div class="abc">
                <div class="label">分散の強さ</div><div><input class="setting-input" type="number" value="1.0" step="0.1" min="0" /></div><div></div>
                <div class="label">回数の効き</div><div><input class="setting-input" type="number" value="3" min="0" /></div><div>回</div>
                <div class="label">直近の重み</div><div><input class="setting-input" type="number" value="0.5" step="0.1" min="0" /></div><div></div>
                <div class="label">発売開始～現在までの日数</div><div><input class="setting-input" type="number" value="120" min="0" /></div><div>日</div>
                <div class="label">乖離率の影響（最大値）</div><div><input class="setting-input" type="number" value="20.00" step="0.01" min="0" /></div><div>%</div>
                <div class="label">推奨しきい値</div><div><input class="setting-input" type="number" value="0.90" step="0.01" min="0" /></div><div></div>
              </div>
            </div>
          </div>
        </article>

        <div class="actions">
          <button type="button" class="btn">戻る</button>
          <button type="button" class="btn primary">更新</button>
        </div>
      </section>
    </main>

    <script>
      (() => {
        const presets = {
          short: { a: 60, b: 30, c: 30 },
          standard: { a: 90, b: 60, c: 60 },
          long: { a: 180, b: 90, c: 90 },
          custom: { a: "", b: "", c: "" }
        };

        const inputA = document.getElementById("rangeA");
        const inputB = document.getElementById("weightB");
        const inputC = document.getElementById("periodC");
        const radios = document.querySelectorAll('input[name="term"]');

        const applyPreset = (key) => {
          const values = presets[key];
          if (!values) return;
          inputA.value = values.a;
          inputB.value = values.b;
          inputC.value = values.c;
        };

        radios.forEach((radio) => {
          radio.addEventListener("change", (event) => {
            if (!event.target.checked) return;
            applyPreset(event.target.value);
          });
        });
      })();
    </script>
  </body>
</html>
